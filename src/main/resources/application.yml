# Source: RESEARCH.md 标准技术栈 + CONTEXT.md Claude's Discretion
spring:
  application:
    name: rule-engine

  # 数据库配置（Phase 2: 数据持久化）
  datasource:
    url: jdbc:postgresql://192.168.5.202:5432/yare_engine
    username: leon
    password: ServBay.dev
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # JPA 配置
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 50
          fetch_size: 50
        order_inserts: true
        order_updates: true
        batch_versioned_data: true
        cache:
          use_second_level_cache: false
          use_query_cache: false

  # Flyway 数据库迁移
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true
    placeholder-replacement: false

  # 注意：Java 17 不直接支持虚拟线程，需要 Java 21
  # # D-03: 启用虚拟线程（Java 21 + Spring Boot 3.3）
  # threads:
  #   virtual:
  #     enabled: true

  # 缓存配置（D-13: Caffeine）
  cache:
    type: caffeine
    cache-names: rules, compiled-scripts, decision-flows
    caffeine:
      spec: maximumSize=5000,expireAfterWrite=10m

  # Actuator 配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5, 0.95, 0.99  # P50, P95, P99
      sla:
        http.server.requests: 50ms, 100ms, 200ms  # 性能阈值

# 服务器配置
server:
  port: 8080
  tomcat:
    threads:
      max: 200  # 虚拟线程下可以设置更高的最大线程数
      min-spare: 10
    accept-count: 100
    connection-timeout: 10s  # 10 秒连接超时

# 功能开关（未充分测试的功能默认关闭）
rule-engine:
  features:
    multi-environment:
      enabled: false
    import-export:
      enabled: false

  async:
    # 异步结果存储过期时间（秒）
    result-expire-seconds: 300
    # 结果清理任务执行间隔（秒）
    cleanup-interval-seconds: 60
  execution:
    # 默认超时时间（毫秒）
    default-timeout-ms: 50
    # 降级决策
    degradation-decision: PASS
    degradation-reason: 规则执行超时，返回默认通过决策

# Resilience4j 配置（REXEC-05）
resilience4j:
  circuitbreaker:
    instances:
      ruleExecution:
        # 滑动窗口大小
        sliding-window-size: 100
        # 失败率阈值（百分比），超过则打开断路器
        failure-rate-threshold: 50
        # 断路器打开后等待时间（秒）
        wait-duration-in-open-state: 10s
        # 半开状态允许的请求数
        permitted-number-of-calls-in-half-open-state: 10
        # 最小请求数（达到后才开始计算失败率）
        minimum-number-of-calls: 20
        # 滑动窗口类型
        sliding-window-type: COUNT_BASED
  timelimiter:
    instances:
      ruleExecution:
        timeout-duration: 50ms

# Sa-Token 配置
sa-token:
  token-name: Authorization
  timeout: 86400
  active-timeout: -1
  is-concurrent: true
  is-share: true
  token-style: uuid
  is-log: false

# 日志配置
logging:
  level:
    root: INFO
    com.example.ruleengine: DEBUG
    org.springframework.web: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
