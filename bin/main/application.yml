# Source: RESEARCH.md 标准技术栈 + CONTEXT.md Claude's Discretion
spring:
  application:
    name: rule-engine

  # 数据库配置（Phase 2: 数据持久化）
  datasource:
    url: jdbc:postgresql://192.168.5.202:5432/yare_engine
    username: leon
    password: ServBay.dev
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # JPA 配置
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 50
          fetch_size: 50
        order_inserts: true
        order_updates: true
        batch_versioned_data: true
        cache:
          use_second_level_cache: false
          use_query_cache: false

  # Flyway 数据库迁移
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

  # 注意：Java 17 不直接支持虚拟线程，需要 Java 21
  # # D-03: 启用虚拟线程（Java 21 + Spring Boot 3.3）
  # threads:
  #   virtual:
  #     enabled: true

  # 缓存配置（D-13: Caffeine）
  cache:
    type: caffeine
    cache-names: rules, compiled-scripts
    caffeine:
      spec: maximumSize=5000,expireAfterWrite=10m

  # Actuator 配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5, 0.95, 0.99  # P50, P95, P99
      sla:
        http.server.requests: 50ms, 100ms, 200ms  # 性能阈值

# 服务器配置
server:
  port: 8080
  tomcat:
    threads:
      max: 200  # 虚拟线程下可以设置更高的最大线程数
      min-spare: 10
    accept-count: 100
    connection-timeout: 10s  # 10 秒连接超时

# 日志配置
logging:
  level:
    root: INFO
    com.example.ruleengine: DEBUG
    org.springframework.web: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
